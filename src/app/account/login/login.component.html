<div class="auth-page-wrapper pt-5">
    <!-- auth page bg -->
    <div class="auth-one-bg-position auth-one-bg" id="auth-particles">
        <div class="bg-overlay"></div>

        <div class="shape">
            <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 120">
                <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
            </svg>
        </div>
    </div>

    <!-- auth page content -->
    <div class="auth-page-content">
        <div class="container">

            <!-- end row -->
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="card mt-4">

                        <div class="card-body p-4">
                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="text-center mt-sm-5 mb-4 text-white-50">
                                        <div>
                                            <a href="javascript:void(0);" class="d-inline-block auth-logo">
                                                <img src="assets/images/logo-dark.png" alt="" height="50">
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="p-2 mt-2">
                                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                                    <div class="mb-3">
                                        <label class="form-label" for="login">Login</label>
                                        <input type="text" class="form-control" id="login" formControlName="login" [ngClass]="{ 'is-invalid': submitted && f['login'].errors }" placeholder="Informe seu login ou e-mail">
                                        @if (submitted && f['login'].errors) {
                                        <div class="invalid-feedback">
                                            <div>Login é obrigatório</div>
                                        </div>
                                        }
                                    </div>

                                    <div class="mb-3">
                                        <div class="float-end">
                                            <a routerLink="/pass-reset/basic" class="text-muted">Recuperar senha</a>
                                        </div>
                                        <label class="form-label" for="password-input">Senha</label>
                                        <div class="position-relative auth-pass-inputgroup mb-3">
                                            <input [type]="fieldTextType ? 'text' : 'password'" class="form-control pe-5" placeholder="Informe sua senha" id="password-input" formControlName="senha" [ngClass]="{ 'is-invalid': submitted && f['senha'].errors }">
                                            <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="password-addon"><i class="mdi align-middle" [ngClass]="{'mdi-eye-off-outline': !fieldTextType, 'mdi-eye-outline': fieldTextType
                                          }" (click)="toggleFieldTextType()"></i></button>
                                            @if (submitted && f['senha'].errors) {
                                            <div class="invalid-feedback">
                                                <span>Senha é obrigatória</span>
                                            </div>
                                            }
                                        </div>
                                    </div>

                                    <div class="mt-4">
                                        <button class="btn btn-primary w-100" type="submit">Entrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <!-- end card body -->
                    </div>
                </div>
            </div>
            <!-- end row -->
        </div>
        <!-- end container -->
    </div>
</div>
